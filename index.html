<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Simple Dodge Game</title>
    <style>
        /* Minimalist, non-flashy styling */
        body {
            font-family: sans-serif;
            background-color: #f4f4f4;
            color: #333333;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            touch-action: manipulation; /* Prevents double-tap zoom on mobile */
        }

        .container {
            text-align: center;
            background: #ffffff;
            padding: 15px;
            border: 1px solid #cccccc;
            border-radius: 4px;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }

        /* Simple Canvas */
        canvas {
            background-color: #222222;
            display: block;
            margin: 10px auto;
            border: 1px solid #000000;
            max-width: 100%;
            height: auto;
        }

        .btn {
            background-color: #e0e0e0;
            color: #000000;
            border: 1px solid #999999;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
            text-transform: lowercase;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: #d0d0d0;
        }

        .hidden {
            display: none !important;
        }

        /* Mobile touch controls (only visible/useful on mobile devices) */
        .controls-container {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            width: 100%;
        }

        .control-btn {
            background-color: #e0e0e0;
            border: 1px solid #999999;
            width: 45%;
            height: 60px;
            font-size: 18px;
            font-weight: bold;
            color: #333333;
            user-select: none;
            touch-action: none;
        }

        .control-btn:active {
            background-color: #cccccc;
        }

        .info-text {
            font-size: 12px;
            color: #666666;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h4 style="font-weight: normal; margin: 0 0 10px 0;">dodge</h4>
        
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div id="score-board">score: 0</div>
        <div id="difficulty-board" class="info-text">speed level: 1</div>
        
        <button id="restart-btn" class="btn hidden" onclick="resetGame()">play again</button>

        <div class="controls-container">
            <button id="left-btn" class="control-btn">◀</button>
            <button id="right-btn" class="control-btn">▶</button>
        </div>
        
        <div class="info-text" style="margin-top: 10px;">
            controls: left/right keys or on-screen buttons
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreBoard = document.getElementById('score-board');
        const difficultyBoard = document.getElementById('difficulty-board');
        const restartBtn = document.getElementById('restart-btn');

        // Player configuration
        let player = { 
            x: 185, 
            y: 350, 
            width: 30, 
            height: 30, 
            speed: 6 
        };

        let obstacles = [];
        let score = 0;
        let gameOver = false;
        let keys = {};
        let gameInterval;
        let spawnCounter = 0;

        // Difficulty variables
        let baseSpeed = 2.5; 
        let spawnRate = 45; // lower means more frequent spawns
        let currentLevel = 1;

        // Keyboard Event Listeners
        window.addEventListener('keydown', (e) => { keys[e.key] = true; });
        window.addEventListener('keyup', (e) => { keys[e.key] = false; });

        // Touch Control Listeners (for Mobile Support)
        const leftBtn = document.getElementById('left-btn');
        const rightBtn = document.getElementById('right-btn');

        let touchLeft = false;
        let touchRight = false;

        leftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); touchLeft = true; });
        leftBtn.addEventListener('touchend', () => { touchLeft = false; });
        rightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); touchRight = true; });
        rightBtn.addEventListener('touchend', () => { touchRight = false; });

        // Start game immediately on load
        resetGame();

        function resetGame() {
            player.x = canvas.width / 2 - player.width / 2;
            obstacles = [];
            score = 0;
            baseSpeed = 2.5;
            spawnRate = 45;
            currentLevel = 1;
            gameOver = false;
            spawnCounter = 0;
            
            scoreBoard.innerText = "score: " + score;
            difficultyBoard.innerText = "speed level: " + currentLevel;
            restartBtn.classList.add('hidden');
            
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(updateGame, 1000 / 60); // 60 FPS update loop
        }

        function updateGame() {
            if (gameOver) return;

            // Clear Canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Move Player (supports keyboard and touch inputs)
            if ((keys['ArrowLeft'] || touchLeft) && player.x > 0) {
                player.x -= player.speed;
            }
            if ((keys['ArrowRight'] || touchRight) && player.x < canvas.width - player.width) {
                player.x += player.speed;
            }

            // Draw Player (Low profile gray square)
            ctx.fillStyle = '#888888';
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Difficulty progression (Scaling parameters smoothly)
            // Caps max speed and min frequency to keep it possible but very challenging
            currentLevel = Math.floor(score / 5) + 1;
            difficultyBoard.innerText = "speed level: " + currentLevel;
            
            let currentBaseSpeed = baseSpeed + (currentLevel * 0.4); // increases obstacle speed
            let currentSpawnRate = Math.max(18, spawnRate - (currentLevel * 2)); // increases rate of obstacles

            // Spawn Obstacles
            spawnCounter++;
            if (spawnCounter >= currentSpawnRate) {
                spawnCounter = 0;
                let size = Math.random() * 25 + 15; // Random size variation
                let xPos = Math.random() * (canvas.width - size);
                obstacles.push({ 
                    x: xPos, 
                    y: -size, 
                    width: size, 
                    height: size, 
                    speed: currentBaseSpeed + (Math.random() * 1.5) // slight variation per block
                });
            }

            // Update & Draw Obstacles
            for (let i = 0; i < obstacles.length; i++) {
                let obs = obstacles[i];
                obs.y += obs.speed;

                // Draw Obstacle
                ctx.fillStyle = '#555555';
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);

                // Simple collision check
                if (
                    player.x < obs.x + obs.width &&
                    player.x + player.width > obs.x &&
                    player.y < obs.y + obs.height &&
                    player.y + player.height > obs.y
                ) {
                    endGame();
                }

                // Score tracking & cleanup
                if (obs.y > canvas.height) {
                    obstacles.splice(i, 1);
                    i--;
                    score++;
                    scoreBoard.innerText = "score: " + score;
                }
            }
        }

        function endGame() {
            gameOver = true;
            clearInterval(gameInterval);
            
            // Render basic Game Over screen state
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#ffffff';
            ctx.font = '18px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText("game over", canvas.width / 2, canvas.height / 2 - 10);
            ctx.fillText("final score: " + score, canvas.width / 2, canvas.height / 2 + 20);
            
            restartBtn.classList.remove('hidden');
        }
    </script>
</body>
</html>
